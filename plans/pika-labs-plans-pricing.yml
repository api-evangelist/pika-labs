specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Pika Labs
providerId: pika-labs
created: '2026-05-08'
modified: '2026-05-08'
reconciled: partial
tags:
- AI
- Video Generation
- Text-to-Video
- Multimodal
- Generative
- Plans
description: >-
  Pika does not currently publish a first-party API on pika.art. API access is offered
  through fal.ai which prices each Pika model per call/per second of generated video. The
  consumer Pika web app uses a credits-based subscription model (Free/Standard/Pro/Fancy).
notes: First-party API plans are not published; aggregator (fal.ai) per-call pricing should be confirmed in the fal.ai model catalog.
sources:
- https://pika.art/
- https://fal.ai/models?keywords=pika
plans:
- id: pika-labs-fal-payg
  name: Pika via fal.ai (Pay-as-you-go)
  type: usage
  description: Per-call Pika model invocations on fal.ai; rate depends on selected model and video duration.
  entries:
  - label: Pika via fal.ai
    name: pika_fal
    type: per_unit
    metric: video
    limit: -1
    timeFrame: usage
    geo: global
    unit: 1
    price: see fal.ai model page (per-call / per-second)
    userMultiplied: false
- id: pika-labs-consumer
  name: Pika Consumer Subscription (Web)
  type: subscription
  description: Consumer-facing Pika web app credit plans (Free, Standard, Pro, Fancy). Credits are not interchangeable with API usage.
  entries:
  - label: Web Subscription
    name: web_subscription
    type: flat
    metric: month
    limit: 1
    timeFrame: month
    geo: global
    unit: 1
    price: see pika.art/pricing
    userMultiplied: false
maintainers:
