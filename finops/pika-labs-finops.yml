  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Aggregator (fal.ai)
serviceCategory: AI
billingModel:
  pricingCategory: Aggregator-Mediated Per-Call Usage
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: Pika Video Generation
  ServiceCategory: AI
  ProviderName: Pika Labs
  PublisherName: fal.ai (or chosen aggregator)
  InvoiceIssuerName: fal.ai (or chosen aggregator)
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
- name: video_generations
  description: Pika model invocations through aggregator (per call, sometimes per second of video).
  unit: video
  aggregation: sum
  dimensions:
  - account
  - aggregator
  - model
principles:
- name: Visibility
  description: Pull aggregator invoice line items filtered to Pika-tagged calls.
- name: Allocation
  description: Tag aggregator API keys per consuming product surface.
- name: Optimization
  description: Compare aggregator price sheets if multiple host Pika models.
- name: Accountability
  description: Assign owner of aggregator account that invoices Pika usage.
