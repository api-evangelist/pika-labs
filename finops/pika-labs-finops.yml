description: >-
  FOCUS-aligned FinOps view of Pika Labs. Pika does not bill API usage directly; integrators
  pay the chosen aggregator (fal.ai) which invoices Pika model calls separately. FinOps
  centers on tracking aggregator invoices and tagging Pika-specific calls.
notes: Publisher and Invoice Issuer is the aggregator (e.g. fal.ai), not Pika Labs.
sources:
- https://pika.art/
- https://fal.ai/
- https://focus.finops.org/focus-specification/v1-3/
