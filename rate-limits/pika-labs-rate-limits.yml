description: >-
  No first-party Pika API exists, so rate limits depend on the chosen aggregator. fal.ai
  enforces account-tier RPS and concurrent job limits documented on its platform.
notes: For production integrations, consult fal.ai documentation for the limits applicable to the selected Pika model.
sources:
- https://fal.ai/
- https://pika.art/
responseCodes:
  throttled: 429
limits:
- name: Aggregator Limits (fal.ai)
  scope: account
  metric: requests
  limit: see fal.ai account dashboard
  notes: Rate limits are enforced by fal.ai when using Pika models through their queue API.
policies:
- name: Backoff Strategy
  description: Clients should implement exponential backoff with jitter and honor any Retry-After header.
- name: Aggregator Choice
  description: Pick a Pika-supporting aggregator (fal.ai) appropriate for required throughput and rate limits.
